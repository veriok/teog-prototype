<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echoes of Germolles — Prototype</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header id="header">
    <div>
      <div id="header-title">Echoes of Germolles</div>
      <div id="header-subtitle">Autobattler RPG · Prototype v0.1</div>
    </div>
    <div id="header-controls">
      <span id="run-stats" style="font-family:var(--font-heading);font-size:0.62rem;color:var(--text-dim);letter-spacing:0.1em;margin-right:8px;"></span>
      <span id="save-indicator"></span>
      <button class="btn btn-danger" id="btn-wipe" title="Erase all save data">Wipe Save</button>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────────────── -->
  <div id="main">

    <!-- Left column: battle log -->
    <div id="log-panel">
      <div id="log-header">
        <div id="log-title">Chronicle of Battle</div>
      </div>
      <div id="log-scroll"></div>
    </div>

    <!-- Right column: area info + controls + battlefield -->
    <div id="right-panel">

      <!-- Area panel -->
      <div id="area-panel">
        <div id="area-info">
          <div id="area-name">—</div>
          <div id="area-desc">—</div>
        </div>
        <div id="event-track"></div>
      </div>

      <!-- Control bar — top of right panel -->
      <div id="control-bar">
        <div style="display:flex;align-items:center;gap:16px;">
          <div id="battle-status">Awaiting deployment.</div>
          <div id="speed-control">
            <span id="speed-label">Speed</span>
            <button class="speed-btn active" data-speed="1">1×</button>
            <button class="speed-btn" data-speed="2">2×</button>
            <button class="speed-btn" data-speed="4">4×</button>
          </div>
        </div>
        <div id="control-buttons">
          <button class="btn" id="btn-restart" disabled>↺ Restart Zone</button>
          <button class="btn btn-primary" id="btn-start">⚔ Engage</button>
          <button class="btn btn-primary" id="btn-next" disabled>Next Event →</button>
        </div>
      </div>

      <!-- Battle area -->
      <div id="battle-area">

        <div id="battle-area-label">⚔ &nbsp; battlefield &nbsp; ⚔</div>

        <div id="battlefield-grid">
          <div class="bf-col" id="bf-player-back">
            <div class="bf-col-label">Back</div>
          </div>
          <div class="bf-col" id="bf-player-front">
            <div class="bf-col-label">Front</div>
          </div>
          <div class="bf-vs-divider"></div>
          <div class="bf-col" id="bf-enemy-front">
            <div class="bf-col-label">Front</div>
          </div>
          <div class="bf-col" id="bf-enemy-back">
            <div class="bf-col-label">Back</div>
          </div>
        </div>

        <!-- Loot display (for loot events) -->
        <div id="loot-display"></div>

      </div>

    </div><!-- /right-panel -->

  </div><!-- /main -->

</div><!-- /app -->

<!-- ── Result banner ──────────────────────────────────────────────────── -->
<div id="result-banner">
  <div id="result-banner-text"></div>
</div>

<!-- ── Modal overlay ──────────────────────────────────────────────────── -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title"></div>
    <div id="modal-body"></div>
    <div id="modal-buttons"></div>
  </div>
</div>

<!-- ── Scripts (order matters) ────────────────────────────────────────── -->
<script src="js/data.js"></script>
<script src="js/save.js"></script>
<script src="js/ui.js"></script>
<script src="js/battle.js"></script>
<script src="js/main.js"></script>

</body>
</html>
